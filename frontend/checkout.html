<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Complete your purchase on ShopWave. Secure checkout with order summary.">
  <title>Checkout — ShopWave</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="page-content">
    <div class="container">
      <h1 class="page-title">Checkout</h1>
      <p class="page-subtitle">Complete your order details below</p>

      <div class="checkout-layout">
        <!-- Checkout Form -->
        <div class="checkout-form-card">
          <h2>Shipping Information</h2>
          <form id="checkout-form">
            <div class="form-group">
              <label class="form-label" for="checkout-name">Full Name</label>
              <input type="text" id="checkout-name" class="form-input" placeholder="John Doe" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="checkout-email">Email Address</label>
              <input type="email" id="checkout-email" class="form-input" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="checkout-address">Shipping Address</label>
              <textarea id="checkout-address" class="form-input" placeholder="123 Main St, City, State, ZIP" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%">Place Order</button>
          </form>
        </div>

        <!-- Order Summary -->
        <div class="order-summary-card">
          <h3>Order Summary</h3>
          <div id="order-summary-items"></div>
          <div class="summary-row total">
            <span>Total</span>
            <span id="order-total"></span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/components.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
