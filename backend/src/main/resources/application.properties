server.port=8080
spring.application.name=shop

# ============================================
# DATABASE CONFIGURATION
# ============================================
# Currently using H2 (works immediately, no setup)
# To switch to MySQL: Comment H2 lines, uncomment MySQL lines

# H2 Database (ACTIVE - No installation required)
spring.datasource.url=jdbc:h2:file:./data/shopwave
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# MySQL Database (READY - Uncomment when MySQL is installed)
#spring.datasource.url=jdbc:mysql://localhost:3306/shopwave?createDatabaseIfNotExist=true
#spring.datasource.username=root
#spring.datasource.password=root
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 Console (Access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=ShopWaveSecretKeyForJWTTokenGenerationMustBeLongEnough2024!
jwt.expiration=86400000
