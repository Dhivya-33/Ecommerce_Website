<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ShopWave Admin Panel — Manage products, view orders, and control your store.">
  <title>Admin Panel — ShopWave</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <main class="page-content">
    <div class="container">
      <div class="admin-header">
        <div>
          <h1 class="page-title">Admin Panel</h1>
          <p class="page-subtitle" style="margin-bottom:0">Store Overview & Inventory</p>
        </div>
        <button class="btn btn-primary" onclick="openAddModal()" id="add-product-btn">+ Add Product</button>
      </div>

      <!-- Analytics Dashboard -->
      <div class="admin-dashboard">
        <div class="stat-card">
          <span class="stat-label">Total Revenue</span>
          <span class="stat-value" id="stat-revenue">$0.00</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Total Orders</span>
          <span class="stat-value" id="stat-orders">0</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">Avg. Order</span>
          <span class="stat-value" id="stat-avg-order">$0.00</span>
        </div>
        <div class="stat-card warning">
          <span class="stat-label">Low Stock</span>
          <span class="stat-value" id="stat-low-stock">0</span>
        </div>
      </div>

      <div class="admin-table-wrapper">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Product</th>
              <th>Category</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="admin-products-body">
            <tr><td colspan="6"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Product Modal -->
  <div class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Add Product</h2>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <form id="product-form">
        <div class="form-group">
          <label class="form-label" for="prod-name">Product Name</label>
          <input type="text" id="prod-name" class="form-input" placeholder="Product name" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="prod-description">Description</label>
          <textarea id="prod-description" class="form-input" placeholder="Product description" required></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" for="prod-price">Price ($)</label>
          <input type="number" id="prod-price" class="form-input" placeholder="0.00" step="0.01" min="0" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="prod-category">Category</label>
          <input type="text" id="prod-category" class="form-input" placeholder="e.g., Electronics" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="prod-imageUrl">Image URL</label>
          <input type="text" id="prod-imageUrl" class="form-input" placeholder="https://..." required>
        </div>
        <div class="form-group">
          <label class="form-label" for="prod-stock">Stock</label>
          <input type="number" id="prod-stock" class="form-input" placeholder="0" min="0" required>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/components.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
